<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 600" width="1000" height="600" role="img" aria-label="Creando Lazos">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#eef4fd"/>
      <stop offset="1" stop-color="#fbeef5"/>
    </linearGradient>
    <linearGradient id="wordmark" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#3f7cc6"/>
      <stop offset="1" stop-color="#c0397f"/>
    </linearGradient>
    <filter id="soft" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
  </defs>
  <rect width="1000" height="600" fill="url(#bg)"/>
  <circle cx="120" cy="110" r="190" fill="#3f7cc6" opacity="0.10"/>
  <circle cx="900" cy="520" r="220" fill="#c0397f" opacity="0.10"/>
  <g filter="url(#soft)" opacity="0.18">
    <ellipse cx="500" cy="300" rx="260" ry="170" fill="#ffffff"/>
  </g>
  <image href="data:image/png;base64," x="390" y="120" width="220" height="220"/>
  <text x="500" y="430" text-anchor="middle" font-family="'Poppins','Segoe UI',Arial,sans-serif" font-size="74" font-weight="700" fill="url(#wordmark)">Creando Lazos</text>
  <line x1="410" y1="468" x2="590" y2="468" stroke="#c0397f" stroke-width="3" stroke-linecap="round" opacity="0.6"/>
  <text x="500" y="512" text-anchor="middle" font-family="'Poppins','Segoe UI',Arial,sans-serif" font-size="30" font-weight="500" fill="#5a6473">Gestión de citas y horarios</text>
</svg>
